            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .filter-item input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-red);
        }

        .filter-item label {

            color: var(--accent-blue);
        }

        .mode-switcher {

            gap: 10px;

            background: white;
            color: var(--accent-blue);
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;

            color: white;
        }

        .mode-btn:hover {
            background: var(--accent-blue);
            color: white;

            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;

            padding: 25px;
            border-radius: 15px;

            font-size: 1.1rem;
            border-left: 4px solid var(--primary-red);

            flex-grow: 1;
            min-height: 400px;

            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;

            border: 1px solid #ddd;
            width: 100%;
            font-size: 1rem;
            color: var(--accent-blue);

                        { label: 'N2', data: [], borderColor: '#0d3b66', backgroundColor: '#0d3b66', tension: 0.3 },
                        { label: 'N3', data: [], borderColor: '#7a9d6e', backgroundColor: '#7a9d6e', tension: 0.3 },
                        { label: 'N4', data: [], borderColor: '#f8b4d4', backgroundColor: '#f8b4d4', tension: 0.3 },
                        { label: 'N5', data: [], borderColor: '#FF6B7A', backgroundColor: '#FF6B7A', tension: 0.3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        function initShareChart() {
            const ctx = document.getElementById('shareChart').getContext('2d');
            shareChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['香港及澳門', '日本國內', '其他海外地區'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#c9171e', '#0d3b66', '#7a9d6e']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function populateYearSelect() {
            const select = document.getElementById('yearSelect');
            rawData.Share_Stats.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = d.Year;
                if(d.Year === "2023(Dec)") opt.selected = true;
                select.appendChild(opt);
            });
            updateDonut();
        }

        function updateDonut() {
            const index = document.getElementById('yearSelect').value;
            const data = rawData.Share_Stats[index];
            if (shareChart) {
                shareChart.data.datasets[0].data = [data.HK_MO_Total, data.Japan_Total, data.Overseas_Total];
                shareChart.update();
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-count').classList.toggle('active', mode === 'count');
            document.getElementById('btn-rate').classList.toggle('active', mode === 'rate');
            
            const title = mode === 'count' ? '香港及澳門地區應考人數趨勢' : '香港及澳門地區各等級合格率趨勢 (%)';
            document.getElementById('mainChartTitle').textContent = title;
            document.getElementById('tableTitle').textContent = mode === 'count' ? '各等級應考人數統計' : '各等級合格率統計 (%)';
            
            updateCharts();
        }

        function updateCharts() {
            const sourceData = currentMode === 'count' ? rawData.HK_MO_Stats : rawData.PassRate_Stats;
            const levels = ['N1', 'N2', 'N3', 'N4', 'N5'];
            
            levels.forEach((level, index) => {
                const checked = document.getElementById(level.toLowerCase()).checked;
                trendChart.data.datasets[index].data = sourceData.map(d => d[level]);
                trendChart.setDatasetVisibility(index, checked);
            });
            
            trendChart.update();
            populateTable();
        }

        function populateTable() {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            const sourceData = currentMode === 'count' ? rawData.HK_MO_Stats : rawData.PassRate_Stats;
            const totalKey = currentMode === 'count' ? 'Total' : 'Overall';
            
            sourceData.forEach(d => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.Year}</td>
                    <td>${document.getElementById('n1').checked ? d.N1 : '-'}</td>
                    <td>${document.getElementById('n2').checked ? d.N2 : '-'}</td>
                    <td>${document.getElementById('n3').checked ? d.N3 : '-'}</td>
                    <td>${document.getElementById('n4').checked ? d.N4 : '-'}</td>
                    <td>${document.getElementById('n5').checked ? d.N5 : '-'}</td>
                    <td style="font-weight:bold">${d[totalKey]}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
