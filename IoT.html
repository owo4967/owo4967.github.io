<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT 體驗 - 伝える (Tsutaeru)</title>
    <!-- 引入 Leaflet CSS 用於地圖 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --primary-red: #c9171e;
            --primary-beige: #f5f5dc;
            --accent-blue: #0d3b66;
            --accent-pink: #f8b4d4;
            --accent-green: #7a9d6e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans CJK TC', 'Microsoft JhengHei', sans-serif;
            background: var(--primary-beige);
            color: #333;
            line-height: 1.6;
        }

        /* ============ 導航列 ============ */
        nav {
            background: white;
            padding: 10px 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
        }

        .logo {
            height: 80px;
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 100%;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-red);
        }

        .nav-cta {
            background: var(--primary-red);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 23, 30, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============ 頁面標題 ============ */
        .page-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-beige) 0%, #fff 100%);
            border-bottom: 5px solid var(--primary-red);
        }

        .page-header h1 {
            font-size: 3rem;
            color: var(--primary-red);
            margin-bottom: 15px;
        }

        .page-header p {
            font-size: 1.1rem;
            color: #666;
        }

        /* ============ 主要內容 ============ */
        .iot-section {
            padding: 60px 0;
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--accent-blue);
            margin: 50px 0 30px;
            text-align: center;
            position: relative;
            padding-bottom: 20px;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary-red);
            border-radius: 2px;
        }

        /* ============ 標籤頁 ============ */
        .tab-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: 2px solid var(--accent-blue);
            background: white;
            color: var(--accent-blue);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-red);
            color: white;
            border-color: var(--primary-red);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        /* ============ NFC 標籤管理 ============ */
        .nfc-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 50px;
        }

        .nfc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nfc-header h3 {
            font-size: 1.3rem;
            color: var(--accent-blue);
        }

        .add-btn {
            padding: 10px 25px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
        }

        .nfc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .nfc-card {
            background: linear-gradient(135deg, var(--primary-beige) 0%, rgba(248, 180, 212, 0.2) 100%);
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
        }

        .nfc-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .nfc-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .nfc-card h4 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .nfc-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .nfc-status {
            display: inline-block;
            padding: 6px 12px;
            background: var(--accent-green);
            color: white;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .nfc-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--accent-blue);
        }

        /* NFC 預覽彈窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .modal-body {
            text-align: center;
        }

        .modal-body h4 {
            color: var(--primary-red);
            margin-bottom: 20px;
        }

        .tag-preview-content {
            background: var(--primary-beige);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        /* ============ 香港日語情境地圖 ============ */
        .map-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 50px;
            display: none;
        }

        .map-section.active {
            display: block;
        }

        #real-map {
            height: 450px;
            width: 100%;
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            margin-bottom: 30px;
            z-index: 1;
        }

        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .location-card {
            background: linear-gradient(135deg, var(--primary-beige) 0%, rgba(248, 180, 212, 0.2) 100%);
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
        }

        .location-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .location-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .location-card h4 {
            font-size: 1.1rem;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .location-address {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
        }

        .location-card p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .learn-btn {
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary-red);
            color: white;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }

        /* ============ AI 發音教練 ============ */
        .pronunciation-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 50px;
            display: none;
        }

        .pronunciation-section.active {
            display: block;
        }

        .pronunciation-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .word-display {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary-red);
            margin-bottom: 10px;
        }

        .pronunciation-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .control-btn {
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn.primary {
            background: var(--primary-red);
            color: white;
        }

        .control-btn.secondary {
            background: var(--accent-blue);
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .control-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .score-display {
            background: var(--primary-beige);
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            display: none;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 900;
            color: var(--accent-green);
        }

        .score-bar {
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            transition: width 1s ease-out;
        }

        /* ============ 頁尾 ============ */
        footer {
            background: var(--accent-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 80px;
        }

        footer p {
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-pink);
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 2rem; }
            .nfc-section, .map-section, .pronunciation-section { padding: 25px; }
            .pronunciation-controls { flex-direction: column; }
            .control-btn { width: 100%; }
        }
    </style>
</head>

    <!-- 頁面標題 -->

    <!-- 主要內容 -->
    <main class="container">
        <section class="iot-section">
            <!-- 標籤頁 -->
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('nfc')">📱 NFC 標籤</button>
                <button class="tab-btn" onclick="switchTab('map')">🗺️ 情境地圖</button>
                <button class="tab-btn" onclick="switchTab('pronunciation')">🎤 發音教練</button>
            </div>

            <!-- NFC 標籤管理 -->
            <div id="nfc" class="nfc-section">
                <div class="nfc-header">
                    <h3>📱 我的 NFC 智慧卡片</h3>
                    <button class="add-btn" onclick="alert('請將新卡片靠近手機 NFC 感應區進行綁定')">+ 綁定新卡片</button>

                <h3 style="font-size: 1.3rem; color: var(--accent-blue); margin-bottom: 20px;">📍 推薦日本餐廳 (香港)</h3>

                    <div class="pronunciation-controls">
                        <button class="control-btn primary" onclick="playStandardPronunciation()">▶️ 播放標準發音</button>
                        <button class="control-btn secondary" id="recordBtn" onclick="startRecording()">🎙️ 開始錄音</button>
                    </div>

                    <div id="scoreDisplay" class="score-display">
                        <div class="score-label">您的發音評分</div>
                        <div class="score-value" id="scoreValue">0/100</div>
                        <div class="score-bar">
                            <div class="score-fill" id="scoreFill"></div>
                        </div>
                        <p style="font-size: 0.9rem; color: #666; margin-top: 10px;" id="scoreFeedback">
                            正在分析您的發音...
                        </p>
                    </div>

                    <div style="margin-top: 30px;">
                        <button class="control-btn primary" onclick="nextWord()" style="width: 100%; max-width: 300px; justify-content: center;">下一個單詞 →</button>
                    </div>

    <!-- NFC 預覽 Modal -->
    <div id="nfcModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body">

    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // --- 標籤切換 ---
        function switchTab(tabName) {
            document.getElementById('nfc').style.display = 'none';
            document.getElementById('map').classList.remove('active');
            document.getElementById('pronunciation').classList.remove('active');

            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (tabName === 'nfc') {
                document.getElementById('nfc').style.display = 'block';
                buttons[0].classList.add('active');
            } else if (tabName === 'map') {
                document.getElementById('map').classList.add('active');
                buttons[1].classList.add('active');
                setTimeout(() => { map.invalidateSize(); }, 100); // 確保地圖正確渲染
            } else if (tabName === 'pronunciation') {
                document.getElementById('pronunciation').classList.add('active');
                buttons[2].classList.add('active');
            }
        }

        // --- NFC 標籤數據與功能 ---
        const nfcTags = [
            { id: 1, icon: '🎴', title: '基礎假名卡', desc: '包含平假名與片假名的完整學習內容', content: '【內容】あ, い, う, え, お...<br>【進度】已學習 80%<br>【最後更新】2024-03-01' },
            { id: 2, icon: '🍜', title: '餐廳用語卡', desc: '在香港日式餐廳點餐的必備詞彙', content: '【內容】注文, お会計, 美味しい...<br>【進度】已學習 45%<br>【最後更新】2024-03-05' },
            { id: 3, icon: '🛍️', title: '購物用語卡', desc: '在日式商店購物時的常用表達', content: '【內容】いくらですか, これをください...<br>【進度】已學習 20%<br>【最後更新】2024-03-10' }
        ];

        function renderNfcTags() {
            const grid = document.getElementById('nfcGrid');
            grid.innerHTML = nfcTags.map(tag => `
                <div class="nfc-card">
                    <div class="nfc-icon">${tag.icon}</div>
                    <h4>${tag.title}</h4>
                    <p>${tag.desc}</p>
                    <div class="nfc-status">✓ 已綁定</div>
                    <div class="nfc-actions">
                        <button class="action-btn" onclick="previewTag(${tag.id})">預覽</button>
                        <button class="action-btn" onclick="manageTag(${tag.id})">管理</button>
                    </div>
                </div>
            `).join('');
        }

        function previewTag(id) {
            const tag = nfcTags.find(t => t.id === id);
            document.getElementById('modalTitle').textContent = tag.title + ' 預覽';
            document.getElementById('modalContent').innerHTML = tag.content;
            document.getElementById('nfcModal').style.display = 'block';
        }

        function manageTag(id) {
            const tag = nfcTags.find(t => t.id === id);
            const newTitle = prompt('請輸入新的標籤名稱：', tag.title);
            if (newTitle) {
                tag.title = newTitle;
                renderNfcTags();
                alert('修改成功！');
            }
        }

        function closeModal() {
            document.getElementById('nfcModal').style.display = 'none';
        }

        // --- 地圖整合與餐廳數據 ---
        let map;
        const restaurants = [
            { name: "壽司郎 (Sushiro) - 旺角", lat: 22.3191, lng: 114.1694, address: "旺角彌敦道 628 號瓊華中心地庫", icon: "🍣" },
            { name: "一蘭拉麵 (Ichiran) - 尖沙咀", lat: 22.2976, lng: 114.1722, address: "尖沙咀棉登徑 8 號地庫 B 舖", icon: "🍜" },
            { name: "勝博殿 (Saboten) - 銅鑼灣", lat: 22.2808, lng: 114.1839, address: "銅鑼灣軒尼詩道 500 號希慎廣場 12 樓", icon: "🍱" },
            { name: "大戶屋 (Ootoya) - 太古", lat: 22.2858, lng: 114.2173, address: "太古城道 18 號太古城中心一期", icon: "🍲" }
        ];

        function initMap() {
            map = L.map('real-map').setView([22.3193, 114.1694], 11); // 以香港為中心
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            restaurants.forEach(res => {
                L.marker([res.lat, res.lng]).addTo(map)
                    .bindPopup(`<b>${res.name}</b><br>${res.address}`);
            });
        }

        function renderLocations() {
            const grid = document.getElementById('locationGrid');
            grid.innerHTML = restaurants.map(res => `
                <div class="location-card">
                    <div class="location-icon">${res.icon}</div>
                    <h4>${res.name}</h4>
                    <div class="location-address">${res.address}</div>
                    <p>在實際場景中練習點餐與互動，提升日語應用能力。</p>
                    <button class="learn-btn" onclick="alert('正在加載 ${res.name} 的專屬詞彙...')">學習詞彙</button>
                </div>
            `).join('');
        }

        // --- 發音教練功能 ---
        const words = [
            { jp: "こんにちは", zh: "你好" },
            { jp: "ありがとうございます", zh: "非常感謝" },
            { jp: "美味しいです", zh: "很好吃" },
            { jp: "いくらですか", zh: "多少錢？" },
            { jp: "さようなら", zh: "再見" }
        ];
        let currentWordIndex = 0;

        function playStandardPronunciation() {
            const text = words[currentWordIndex].jp;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        function startRecording() {
            const btn = document.getElementById('recordBtn');
            btn.disabled = true;
            btn.textContent = '🛑 正在錄音...';
            
            document.getElementById('scoreDisplay').style.display = 'none';

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '🎙️ 開始錄音';
                showScore();
            }, 3000);
        }

        function showScore() {
            const scoreDisplay = document.getElementById('scoreDisplay');
            const scoreValue = document.getElementById('scoreValue');
            const scoreFill = document.getElementById('scoreFill');
            const feedback = document.getElementById('scoreFeedback');

            const score = Math.floor(Math.random() * 30) + 70; // 模擬 70-100 的評分
            
            scoreDisplay.style.display = 'block';
            scoreValue.textContent = `${score}/100`;
            
            setTimeout(() => {
                scoreFill.style.width = `${score}%`;
            }, 100);

            if (score >= 90) {
                feedback.textContent = "完美！您的發音與母語者幾乎沒有區別。";
                feedback.style.color = "var(--accent-green)";
            } else if (score >= 80) {
                feedback.textContent = "很好！發音很清晰，再注意一下重音即可。";
                feedback.style.color = "var(--accent-blue)";
            } else {
                feedback.textContent = "不錯！建議多聽幾遍標準發音並再次嘗試。";
                feedback.style.color = "#666";
            }
        }

        function nextWord() {
            currentWordIndex = (currentWordIndex + 1) % words.length;
            document.getElementById('currentWord').textContent = words[currentWordIndex].jp;
            document.getElementById('currentTranslation').textContent = words[currentWordIndex].zh;
            document.getElementById('scoreDisplay').style.display = 'none';
            document.getElementById('scoreFill').style.width = '0%';
        }

        // 初始化
        window.onload = () => {
            renderNfcTags();
            initMap();
            renderLocations();
        };

        // 點擊 Modal 外部關閉
        window.onclick = (event) => {
            if (event.target == document.getElementById('nfcModal')) {
                closeModal();
            }
        };
    </script>
</body>
</html>
