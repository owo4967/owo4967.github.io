    <style>
        :root {

            --primary-beige: #f5f5dc;
            --accent-blue: #0d3b66;

        * {

            box-sizing: border-box;

        body {
            font-family: 'Noto Sans CJK TC', 'Microsoft JhengHei', sans-serif;

            position: sticky;

            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
        }
        
        .logo {
            height: 80px;
            display: flex;
            align-items: center;
        }
        
        .logo img {
            height: 100%;
            object-fit: contain;
        }
        
        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--primary-red);
        }
        
        .nav-cta {
            background: var(--primary-red);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
        }
        
        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 23, 30, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* ============ 頁面標題 ============ */
        .page-header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(135deg, rgba(201, 23, 30, 0.05) 0%, rgba(13, 59, 102, 0.05) 100%);
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            color: var(--primary-red);
            margin-bottom: 10px;
            font-weight: 900;
        }
        
        .breadcrumb {
            font-size: 0.9rem;
            color: var(--accent-blue);
            margin-bottom: 15px;
        }
        
        .breadcrumb a {
            color: var(--primary-red);
            text-decoration: none;
            font-weight: 600;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        /* ============ 主要內容 ============ */
        .content {
            padding: 60px 20px;
        }
        
        .flashcard-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            border-top: 5px solid var(--primary-red);
        }
        
        .flashcard-section h2 {
            font-size: 1.8rem;
            color: var(--primary-red);
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: var(--primary-red);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        
        .card-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }
        
        .flashcard {
            width: 100%;
            max-width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #f5f5dc 0%, #fff9f5 100%);
            border: 3px solid var(--primary-red);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-red);
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .flashcard:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(201, 23, 30, 0.2);
        }
        
        .flashcard.flipped {
            background: linear-gradient(135deg, var(--primary-red) 0%, #a01216 100%);
            color: white;
        }
        
        .card-label {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-blue);
        }
        
        .flashcard.flipped .card-label {
            color: white;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            background: var(--primary-red);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .btn:hover {
            background: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-secondary {
            background: var(--accent-blue);
        }
        
        .btn-secondary:hover {
            background: var(--primary-red);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(201, 23, 30, 0.1) 0%, rgba(13, 59, 102, 0.1) 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-red);
        }
        
        .stat-card .label {
            font-size: 0.9rem;
            color: var(--accent-blue);
            font-weight: 600;
            margin-top: 5px;
        }
        
        /* ============ 頁尾 ============ */
        footer {
            background: var(--accent-blue);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }
        
        footer p {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 導航列 -->
<nav>
    <div class="nav-container">
        <a href="./index.html" class="logo">
            <img src="/home/ubuntu/upload/tsutaeru_social_media.png" alt="Tsutaeru Logo" style="height: 80px; width: auto;">

        <ul class="nav-links">
            <li><a href="./index.html">首頁</a></li>

            <li><a href="./Resources.html">學習資源</a></li>
            <li><a href="./CulturalLearning.html">文化學習</a></li>
            <li><a href="./AboutUs.html">關於我們</a></li>
            <li><a href="./Community.html">社群</a></li>

        </ul>
        <a href="./UserAccount.html" class="nav-cta">我的帳戶</a>
    </div>
</nav>

<!-- /導航列 -->

    <!-- 頁面標題 -->
    <div class="page-header">
        <div class="breadcrumb">
            <a href="./InteractivePractice.html">互動練習</a> > 單詞卡
        </div>
        <h1>🎴 單詞卡</h1>
    </div>

    <!-- 主要內容 -->
    <div class="container">
        <div class="content">
            <!-- 單詞卡練習 -->
            <div class="flashcard-section">
                <h2>日常用語單詞卡</h2>
                <p>點擊卡片翻轉，查看日文單詞的中文翻譯。標記您已認識的單詞。</p>
                
                <!-- 進度條 -->
                <div>
                    <p id="cardCount">第 1 / 10 張</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                
                <!-- 卡片 -->
                <div class="card-container">
                    <div class="flashcard" id="card" onclick="flipCard()">
                        <div class="card-label">日文</div>
                        <div id="cardContent">こんにちは</div>
                    </div>
                </div>
                
                <!-- 統計 -->
                <div class="stats">
                    <div class="stat-card">
                        <div class="number" id="knownCount">0</div>
                        <div class="label">已認識</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="reviewCount">0</div>
                        <div class="label">待複習</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="newCount">10</div>
                        <div class="label">新單詞</div>
                    </div>
                </div>
                
                <!-- 按鈕 -->
                <div class="button-group">
                    <button class="btn" onclick="playPronunciation()">🔊 聽發音</button>
                    <button class="btn" onclick="markAsKnown()">✓ 認識</button>
                    <button class="btn btn-secondary" onclick="markForReview()">⟲ 待複習</button>
                    <button class="btn btn-secondary" onclick="nextCard()">下一張</button>
                    <button class="btn btn-secondary" onclick="goBack()">返回</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 頁尾 -->
    <footer>
        <p>&copy; 2026 伝える (Tsutaeru) — 香港首個 IoT 日語學習平台</p>
    </footer>

    <script>
        const vocabulary = [
            { jp: 'こんにちは', cn: '你好' },
            { jp: 'ありがとう', cn: '謝謝' },
            { jp: 'さようなら', cn: '再見' },
            { jp: 'すみません', cn: '對不起' },
            { jp: '名前', cn: '名字' },
            { jp: '学校', cn: '學校' },
            { jp: '家族', cn: '家人' },
            { jp: '友達', cn: '朋友' },
            { jp: '食べ物', cn: '食物' },
            { jp: '飲み物', cn: '飲料' }
        ];
        
        let currentIndex = 0;
        let isFlipped = false;
        let knownCount = 0;
        let reviewCount = 0;
        let cardStates = new Array(vocabulary.length).fill(null); // null: 新, 'known': 已認識, 'review': 待複習
        
        function flipCard() {
            const card = document.getElementById('card');
            const content = document.getElementById('cardContent');
            isFlipped = !isFlipped;
            
            if (isFlipped) {
                card.classList.add('flipped');
                document.querySelector('.card-label').textContent = '中文';
                content.textContent = vocabulary[currentIndex].cn;
            } else {
                card.classList.remove('flipped');
                document.querySelector('.card-label').textContent = '日文';
                content.textContent = vocabulary[currentIndex].jp;
            }
        }
        
        function markAsKnown() {
            // 如果之前標記為待複習，需要減少待複習計數
            if (cardStates[currentIndex] === 'review') {
                reviewCount--;
            }
            // 如果之前未標記或標記為新，增加已認識計數
            if (cardStates[currentIndex] !== 'known') {
                knownCount++;
            }
            cardStates[currentIndex] = 'known';
            updateStats();
            nextCard();
        }
        
        function markForReview() {
            // 如果之前標記為已認識，需要減少已認識計數
            if (cardStates[currentIndex] === 'known') {
                knownCount--;
            }
            // 如果之前未標記或標記為新，增加待複習計數
            if (cardStates[currentIndex] !== 'review') {
                reviewCount++;
            }
            cardStates[currentIndex] = 'review';
            updateStats();
            nextCard();
        }
        
        function nextCard() {
            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                isFlipped = false;
                updateCard();
            } else {
                alert(`✅ 恭喜！您已完成本組單詞卡練習。\n\n認識: ${knownCount} 個\n待複習: ${reviewCount} 個`);
                goBack();
            }
        }
        
        function updateCard() {
            const card = document.getElementById('card');
            const content = document.getElementById('cardContent');
            card.classList.remove('flipped');
            document.querySelector('.card-label').textContent = '日文';
            content.textContent = vocabulary[currentIndex].jp;
            document.getElementById('cardCount').textContent = `第 ${currentIndex + 1} / ${vocabulary.length} 張`;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / vocabulary.length * 100) + '%';
        }
        
        function updateStats() {
            document.getElementById('knownCount').textContent = knownCount;
            document.getElementById('reviewCount').textContent = reviewCount;
            const newCount = vocabulary.length - knownCount - reviewCount;
            document.getElementById('newCount').textContent = newCount;
        }
        
        function goBack() {
            window.location.href = '03-interactive-practice-main.html';
        }
        
        // 語音發音功能
        function playPronunciation() {
            const word = vocabulary[currentIndex].jp;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'ja-JP'; // 設定為日語
            utterance.rate = 0.8; // 稍微放慢速度
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
